<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="현실치료 사례개념화 노트">
    <meta property="og:description" content="글라서(William Glasser) 모델 기반 블루차트 및 R-R-W-D-E-P 상담 기록 시스템">
    <meta property="og:image" content="bluechart.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link rel="apple-touch-icon" sizes="180x180" href="bluechart.jpg">
    <link rel="icon" type="image/jpeg" sizes="32x32" href="bluechart.jpg">
    <link rel="icon" type="image/jpeg" sizes="192x192" href="bluechart.jpg">
    
    <meta name="theme-color" content="#fbfaf7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>현실치료 사례개념화 노트</title>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <style>
        /* 🌿 클로드 풍의 눈이 편안한 웜톤 테마 지정 */
        body { background-color: #fbfaf7 !important; color: #191919; }
        .bg-white { background-color: #f7f5f0 !important; }
        .bg-gray-100 { background-color: #fbfaf7 !important; }
        .bg-gray-50 { background-color: #f3f0e8 !important; }
        .border-gray-200, .border-gray-300 { border-color: #e6e2da !important; }
        
        /* 버튼 및 포인트 컬러: 클로드 특유의 차분한 카멜 브라운 & 챠콜 톤 */
        .bg-blue-600, .bg-indigo-600 { background-color: #cc7a5c !important; } /* 포인트 브라운 */
        .bg-blue-600:hover, .bg-indigo-600:hover { background-color: #b36449 !important; }
        .bg-gray-600, .bg-gray-800 { background-color: #383735 !important; } /* 챠콜 브라운 */
        .bg-gray-600:hover, .bg-gray-800:hover { background-color: #2c2b29 !important; }
        .text-indigo-600 { color: #cc7a5c !important; }
        .bg-indigo-50 { background-color: #f3f0e8 !important; }
        .bg-indigo-100 { background-color: #e6e2da !important; }

        .chart-container { position: relative; width: 100%; max-width: 800px; }
        
        /* 텍스트 박스: 평상시에는 얇고 투명한 회색 실선으로 깔끔하게 처리 */
        .text-box {
            position: absolute; background: rgba(255, 255, 255, 0.85);
            border: 1px solid #d1d5db; font-size: 8.5pt; overflow: hidden;
            cursor: move; min-width: 60px; min-height: 35px; z-index: 10;
            box-sizing: border-box; padding: 4px;
            transition: border-color 0.15s, border-width 0.15s;
        }
        /* 테두리 정렬(선택/크기 조절) 시에는 파란색 실선으로 변경 */
        .text-box.resize-edge { 
            cursor: se-resize; 
            border: 2px solid #3b82f6; 
        }
        [x-cloak] { display: none !important; }

       /* 🖨️ [인쇄 전면 수정] 배경 몽땅 흰색 + 화면 그대로 캡처하듯 인쇄하는 코드 */
        @media print {
            /* 1. 몽땅 순백색 배경 전환 및 기본 텍스트 검은색 고정 */
            body, html, .max-w-7xl, .bg-white, .bg-gray-100, .bg-indigo-50 {
                background-color: #ffffff !important;
                background: #ffffff !important;
                color: #000000 !important;
            }
            
            /* 2. 상단 프로필 상자 - 배경은 희게 빼고 얇은 회색 테두리만 남김 */
            .mb-6.p-4.bg-gray-50 {
                background-color: #ffffff !important;
                border: 1px solid #d1d5db !important;
                border-radius: 6px !important;
                padding: 12px !important;
            }

            /* 3. 💡 [요청 반영] R-R-W-D-E-P 표 - 구분을 위해 왼쪽 알파벳 칸에만 은은한 회색 음영 주입 */
            .divide-y > div {
                border-bottom: 1px solid #e5e7eb !important;
            }
            .w-20.bg-gray-50 {
                background-color: #f3f4f6 !important; /* 표 왼쪽 항목 칸에만 깔끔한 회색 음영 */
                border-right: 1px solid #e5e7eb !important;
            }

            /* 4. 🔥 [핵심] 화면 레이아웃 깨짐 방지: 모니터 화면 비율(2분할) 그대로 강제 보존 */
            .grid { 
                display: flex !important; 
                flex-direction: row !important; /* 아랫줄로 떨어지지 않고 나란히 배치 */
                gap: 20px !important; 
                width: 100% !important;
            }
            .grid > div {
                flex: 1 !important; /* 좌측 차트와 우측 표가 정확히 반반씩 너비 차지 */
                width: 50% !important;
            }

            /* 5. 블루차트 내부 텍스트 박스 위치 자석 고정 */
            .chart-container {
                position: relative !important;
                width: 100% !important;
            }
            .text-box {
                border: 1px solid #000000 !important;
                background: rgba(255, 255, 255, 0.95) !important;
                position: absolute !important; /* 위치 이탈 차단 */
            }

            /* 6. 인쇄 불필요 요소 원천 차단 */
            header, button, .bg-indigo-55, a, [x-show="!isLoggedIn"], .status-toast, template {
                display: none !important;
            }
        }

    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-6" x-data="app()" x-init="initApp()">

    <div x-show="!isLoggedIn" class="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-xl font-bold mb-4 text-center text-gray-800">현실치료 노트 인증</h2>
            <input type="password" x-model="password" @keyup.enter="login" class="w-full p-2 border rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="비밀번호 입력">
            <button @click="login" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold">로그인</button>
        </div>
    </div>

<!-- 🌿 전체 테마와 어우러지는 단정하고 가독성 높은 웜톤 알림창 -->
    <div x-show="status.show" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform -translate-y-2"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 transform translate-y-0"
         x-transition:leave-end="opacity-0 transform -translate-y-2"
         class="status-toast fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-6 py-2.5 rounded-md shadow-md text-sm flex items-center gap-2 border"
         :style="status.type === 'loading' 
                 ? 'background-color: #f3f0e8 !important; border-color: #e6e2da !important; color: #cc7a5c !important;' 
                 : 'background-color: #cc7a5c !important; border-color: #b36449 !important; color: #ffffff !important;'"
         x-cloak>
        
        <!-- 로딩 중일 때: 부드러운 카멜 브라운 색상의 회전 휠 -->
        <template x-if="status.type === 'loading'">
            <svg class="animate-spin h-4 w-4" style="color: #cc7a5c;" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </template>
        
        <!-- 완료되었을 때: 단정한 별 이모지 -->
        <template x-if="status.type === 'success'">
            <span style="color: #ffffff;">✨</span>
        </template>
        
        <!-- 메시지 텍스트 -->
        <span x-text="status.message" class="font-bold tracking-wide"></span>
    </div>
    
    <div x-show="isLoggedIn" class="max-w-7xl mx-auto" x-cloak>
        <header class="flex flex-col sm:flex-row justify-between items-center mb-6 pb-4 border-b gap-4">
            <h1 class="text-2xl font-bold text-gray-800">🌿 현실치료 사례개념화 노트</h1>
            <div class="space-x-2">
                <button @click="toggleList" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 transition">📋 사례 전체조회</button>
                <button @click="createNewCase" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">➕ 새 사례 등록</button>
            </div>
        </header>

        <div x-show="showList" class="bg-white p-6 rounded-lg shadow mb-6 overflow-x-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-base font-bold text-gray-700">👤 등록 내담자 명단 (가나다순)</h3>
                <button @click="loadDataFromSheets" class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300">🔄 동기화</button>
            </div>
            <table class="w-full border-collapse text-xs">
                <thead>
                    <tr class="bg-gray-100 text-left text-gray-600 font-bold">
                        <th class="p-2.5 border">내담자 이름 (사례명)</th>
                        <th class="p-2.5 border">등록된 상담 상황 개수</th>
                        <th class="p-2.5 border">최근 기록 수정일</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="name in uniqueClientNames" :key="name">
                        <tr class="hover:bg-indigo-50 cursor-pointer transition" @click="selectClientFirstSituation(name)">
                            <td class="p-2.5 border font-semibold text-gray-900 text-sm" x-text="name"></td>
                            <td class="p-2.5 border text-gray-600 font-medium">
                                <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-bold" x-text="getClientSituations(name).length"></span> 개 상황 보유
                            </td>
                            <td class="p-2.5 border text-gray-500" x-text="getLatestUpdateDate(name)"></td>
                        </tr>
                    </template>
                    <template x-if="uniqueClientNames.length === 0">
                        <tr>
                            <td colspan="3" class="p-6 text-center text-gray-400 text-sm">등록된 사례가 없습니다. 새 사례를 추가해 주세요.</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div x-show="currentCase" class="bg-white p-6 rounded-lg shadow-lg">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 pb-4 border-b">
                <div class="flex flex-wrap items-center gap-3">
                    <input type="text" x-model="currentCase.client_name" class="text-2xl font-bold border-b-2 border-gray-300 focus:border-indigo-500 focus:outline-none pb-1" placeholder="내담자 이름">
                    <span class="text-gray-400 text-xl">/</span>
                    <input type="text" x-model="currentCase.situation_name" class="text-lg border-b-2 border-gray-200 focus:border-indigo-400 focus:outline-none pb-1 text-indigo-600 font-medium" placeholder="상황명 입력 (예: 부부 갈등)">
                    
                    <button @click="openSituationMenu" class="ml-2 bg-gray-800 text-white text-xs px-3 py-1.5 rounded-md hover:bg-gray-700 transition font-medium">
                        📂 상황 선택/추가
                    </button>
                </div>
                <button @click="saveData" class="w-full md:w-auto bg-indigo-600 text-white px-6 py-2.5 rounded-lg shadow font-bold hover:bg-indigo-700 transition">
                    💾 저장하기 (Ctrl+Enter)
                </button>
            </div>

            <div class="mb-6 p-4 bg-gray-50 rounded-xl border border-gray-200">
                <h4 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    👤 내담자 기본 프로필 및 임상 정보 (사례 공통)
                </h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">인상착의 및 행동 관찰</label>
                        <textarea x-model="currentCase.client_info.description" class="w-full p-2 border rounded-md text-sm h-24 focus:ring-1 focus:ring-indigo-500 outline-none resize-none" placeholder="행동 특징을 서술하세요..."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">심리검사 결과 요약 (MMPI, TCI, SCT 등)</label>
                        <textarea x-model="currentCase.client_info.test_results" class="w-full p-2 border rounded-md text-sm h-24 focus:ring-1 focus:ring-indigo-500 outline-none resize-none" placeholder="임상 검사 결과를 요약하세요..."></textarea>
                    </div>
                </div>
                
                <div class="mt-4">
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-semibold text-gray-500">임상 자료 및 심리검사지 파일 링크</label>
                        <button @click="addFileLink" class="text-xs bg-indigo-55 text-indigo-600 hover:bg-indigo-100 font-bold px-2 py-1 rounded border border-indigo-200 transition">
                            ➕ 파일 링크 추가
                        </button>
                    </div>
                    
                    <div class="space-y-2 max-h-40 overflow-y-auto pr-1">
                        <template x-for="(linkItem, index) in currentCase.client_info.file_links" :key="index">
                            <div class="flex gap-2 items-center bg-white p-1.5 rounded-md border shadow-sm">
                                <input type="text" x-model="linkItem.name" class="w-1/4 p-1.5 border rounded text-xs focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="자료 설명">
                                <input type="text" x-model="linkItem.url" class="flex-1 p-1.5 border rounded text-xs focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="링크 주소 붙여넣기">
                                <template x-if="linkItem.url">
                                    <a :href="linkItem.url" target="_blank" class="bg-gray-700 text-white p-1.5 rounded text-xs font-medium hover:bg-gray-800 transition">🔗 열기</a>
                                </template>
                                <button @click="removeFileLink(index)" class="bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 p-1.5 rounded text-xs transition">🗑️ 삭제</button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-700 flex items-center">📊 블루차트 (Total Behavior)</span>
                        <button @click="addTextBox" class="bg-yellow-500 text-white text-xs px-3 py-1.5 rounded-md shadow hover:bg-yellow-600">+ 텍스트 박스 추가</button>
                    </div>
                    <div class="chart-container border rounded-lg bg-gray-50 p-1 overflow-hidden shadow-inner" id="chartArea">
                        <img src="bluechart.jpg" alt="Blue Chart" class="w-full opacity-95 select-none">
                        <template x-for="box in currentCase.boxes" :key="box.id">
                            <div class="text-box rounded shadow-md"
                                 :class="box.isEdge ? 'resize-edge' : ''"
                                 :style="`left: ${box.x}px; top: ${box.y}px; width: ${box.w}px; height: ${box.h}px;`"
                                 @mousemove="checkEdge($event, box)"
                                 @mousedown="boxInteractStart($event, box)"
                                 @dblclick="openBoxModal(box)">
                                <div class="w-full h-full overflow-hidden break-all leading-tight text-gray-800" x-html="box.text.replace(/\n/g, '<br>') || '<span class=\'text-gray-400\'>더블클릭 편집</span>'"></div>
                            </div>
                        </template>
                    </div>
                </div>

                <div>
                    <span class="font-bold text-gray-700 block mb-2">📋 R-R-W-D-E-P 상담 과정 기록</span>
                    <div class="border rounded-lg overflow-hidden shadow-sm bg-white divide-y">
                        <template x-for="row in ['R1', 'R2', 'W', 'D', 'E', 'P']">
                            <div class="flex hover:bg-gray-50 cursor-pointer transition" @click="openTableModal(row)">
                                <div class="w-20 bg-gray-50 font-bold flex flex-col items-center justify-center p-4 border-r text-gray-700">
                                    <span class="text-xl" x-text="row[0]"></span>
                                    <span class="text-xs text-gray-400" x-text="row === 'R1' ? '관계' : row === 'R2' ? '주변' : ''"></span>
                                </div>
                                <div class="flex-1 p-4 text-sm text-gray-600 min-h-[4.5rem] flex items-center whitespace-pre-line leading-relaxed" 
                                     x-text="currentCase.table[row] || '클릭하여 내용을 기록하세요.'"></div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="situationModal.show" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" x-cloak>
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md mx-4">
            <h3 class="text-lg font-bold text-gray-800 mb-1">📂 상황 내비게이션</h3>
            <p class="text-xs text-gray-400 mb-4"><span class="font-bold text-indigo-600" x-text="situationModal.clientName"></span> 내담자의 검토/추가할 상황을 선택하세요.</p>
            
            <div class="space-y-2 max-h-60 overflow-y-auto mb-4">
                <template x-for="sit in getClientSituations(situationModal.clientName)" :key="sit.id">
                    <div @click="selectSituationFromModal(sit)" 
                         class="p-3 border rounded-lg hover:bg-indigo-50 cursor-pointer transition flex justify-between items-center"
                         :class="currentCase && currentCase.id === sit.id ? 'border-indigo-600 bg-indigo-50 font-bold' : 'bg-gray-50'">
                        <span class="text-sm text-gray-800" x-text="sit.situation_name || '기본 상황'"></span>
                        <span class="text-xs text-gray-400" x-text="sit.updated_at"></span>
                    </div>
                </template>
            </div>
            
            <div class="border-t pt-3 flex flex-col gap-2">
                <button @click="addSituationInline(situationModal.clientName)" class="w-full bg-green-600 text-white p-2 rounded-md text-sm font-bold hover:bg-green-700 transition">
                    ➕ 이 내담자에게 새 상황 추가하기
                </button>
                <button @click="situationModal.show = false" class="w-full bg-gray-200 text-gray-700 p-2 rounded-md text-sm hover:bg-gray-300 transition">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <div x-show="modal.show" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" x-cloak>
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-lg mx-4">
            <h3 class="text-lg font-bold mb-3 text-gray-800" x-text="modal.title"></h3>
            <textarea x-model="modal.value" class="w-full h-40 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none mb-4 text-sm leading-relaxed"></textarea>
            <div class="flex justify-between items-center">
                <template x-if="modal.type === 'box'">
                    <button @click="deleteBox" class="bg-red-500 text-white px-3 py-1.5 rounded-md text-sm hover:bg-red-600">메모 삭제</button>
                </template>
                <div class="flex space-x-2 ml-auto">
                    <button @click="modal.show = false" class="bg-gray-300 text-gray-700 px-4 py-1.5 rounded-md text-sm">취소</button>
                    <button @click="saveModalValue" class="bg-indigo-600 text-white px-4 py-1.5 rounded-md text-sm font-bold hover:bg-indigo-700">🚀 적용</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyFCssMTQ9A0LsTlB--GsCdZdyg_18LGiMrQlGuiW_FfL0fzXFVTfD2479Wzgptu7kO6w/exec"; 

        function app() {
            return {
                isLoggedIn: false, password: '', showList: false,
                caseList: [], currentCase: null, uniqueClientNames: [],
                modal: { show: false, type: '', targetId: '', title: '', value: '' },
                situationModal: { show: false, clientName: '' },
                
                // 🔔 📍 [신규] 상태 메시지 제어용 상태 객체
                status: { show: false, type: 'loading', message: '' },
                
                triggerStatus(type, message, duration = 2500) {
                    this.status.show = true;
                    this.status.type = type;
                    this.status.message = message;
                    
                    if(type === 'success') {
                        setTimeout(() => { this.status.show = false; }, duration);
                    }
                },

                initApp() {
                    window.addEventListener('keydown', (e) => {
                        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                            if(this.modal.show) { this.saveModalValue(); }
                            else if(this.currentCase) { this.saveData(); }
                        }
                    });
                },
                login() {
                    if(this.password === "1234") { 
                        this.isLoggedIn = true;
                        this.loadDataFromSheets();
                    } else { alert("비밀번호가 올바르지 않습니다."); }
                },
                toggleList() {
                    this.showList = !this.showList;
                    if(this.showList) this.loadDataFromSheets();
                },
                async loadDataFromSheets() {
                    if(!GAS_WEB_APP_URL.includes("macros")) return;
                    
                    // 🔔 데이터 로딩 시작 시 알림 가동
                    this.triggerStatus('loading', '구글 시트 동기화 중...');
                    
                    try {
                        let response = await fetch(GAS_WEB_APP_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'fetch' })
                        });
                        let data = await response.json();
                        this.caseList = data.map(item => {
                            if (!item.client_info) {
                                item.client_info = { description: '', test_results: '', file_links: [] };
                            }
                            if(!item.client_info.file_links) item.client_info.file_links = [];
                            if(item.boxes) item.boxes = item.boxes.map(b => ({ ...b, isEdge: false }));
                            return item;
                        });
                        
                        let names = this.caseList.map(c => c.client_name.trim()).filter(n => n !== "");
                        this.uniqueClientNames = [...new Set(names)].sort();
                        
                        // 🔔 성공 완료 알림 전환
                        this.triggerStatus('success', '동기화 완료!');
                    } catch (e) { 
                        console.error("데이터 로드 실패:", e); 
                        this.triggerStatus('success', '데이터를 가져오지 못했습니다.');
                    }
                },
                
                getClientSituations(clientName) {
                    return this.caseList.filter(c => c.client_name.trim() === clientName.trim());
                },
                getLatestUpdateDate(clientName) {
                    let sits = this.getClientSituations(clientName);
                    if(sits.length === 0) return "-";
                    let dates = sits.map(s => new Date(s.updated_at));
                    return new Date(Math.max(...dates)).toLocaleDateString();
                },
                selectClientFirstSituation(clientName) {
                    let sits = this.getClientSituations(clientName);
                    if(sits.length > 0) {
                        this.currentCase = JSON.parse(JSON.stringify(sits[0]));
                    }
                    this.showList = false;
                },
                
                openSituationMenu() {
                    if(!this.currentCase || !this.currentCase.client_name.trim()) {
                        return alert("사례명(내담자 이름)을 먼저 입력해 주세요.");
                    }
                    this.situationModal.clientName = this.currentCase.client_name;
                    this.situationModal.show = true;
                },
                selectSituationFromModal(situationObj) {
                    this.currentCase = JSON.parse(JSON.stringify(situationObj));
                    this.situationModal.show = false;
                },
                addSituationInline(clientName) {
                    let sits = this.getClientSituations(clientName);
                    let baseInfo = { description: '', test_results: '', file_links: [] };
                    if(sits.length > 0) baseInfo = JSON.parse(JSON.stringify(sits[0].client_info));
                    
                    this.currentCase = {
                        id: Date.now(), client_name: clientName, situation_name: '',
                        created_at: new Date().toLocaleDateString(), updated_at: new Date().toLocaleDateString(),
                        table: { R1:'', R2:'', W:'', D:'', E:'', P:'' }, boxes: [],
                        client_info: baseInfo
                    };
                    this.situationModal.show = false;
                },

                createNewCase() {
                    this.currentCase = {
                        id: Date.now(), client_name: '', situation_name: '',
                        created_at: new Date().toLocaleDateString(), updated_at: new Date().toLocaleDateString(),
                        table: { R1:'', R2:'', W:'', D:'', E:'', P:'' }, boxes: [],
                        client_info: { description: '', test_results: '', file_links: [] }
                    };
                    this.showList = false;
                },
                addFileLink() {
                    if(!this.currentCase.client_info.file_links) this.currentCase.client_info.file_links = [];
                    this.currentCase.client_info.file_links.push({ name: '', url: '' });
                },
                removeFileLink(index) {
                    this.currentCase.client_info.file_links.splice(index, 1);
                },
                addTextBox() {
                    if(!this.currentCase) return;
                    this.currentCase.boxes.push({ id: Date.now(), text: '새 메모', x: 40, y: 60, w: 120, h: 50, isEdge: false });
                },
                checkEdge(e, box) {
                    let rect = e.currentTarget.getBoundingClientRect();
                    box.isEdge = (rect.width - (e.clientX - rect.left) < 12 || rect.height - (e.clientY - rect.top) < 12);
                },
                boxInteractStart(e, box) {
                    e.preventDefault();
                    let container = document.getElementById('chartArea').getBoundingClientRect();
                    let startX = e.clientX, startY = e.clientY;
                    let initialX = box.x, initialY = box.y;
                    let initialW = box.w, initialY_H = box.h;
                    let isResizeMode = box.isEdge;

                    let moveHandler = (moveEvent) => {
                        let deltaX = moveEvent.clientX - startX;
                        let deltaY = moveEvent.clientY - startY;
                        if (isResizeMode) {
                            box.w = Math.max(60, initialW + deltaX);
                            box.h = Math.max(35, initialY_H + deltaY);
                        } else {
                            box.x = Math.max(0, Math.min(initialX + deltaX, container.width - box.w));
                            box.y = Math.max(0, Math.min(initialY + deltaY, container.height - box.h));
                        }
                    };
                    let upHandler = () => {
                        window.removeEventListener('mousemove', moveHandler);
                        window.removeEventListener('mouseup', upHandler);
                    };
                    window.addEventListener('mousemove', moveHandler);
                    window.addEventListener('mouseup', upHandler);
                },
                openBoxModal(box) {
                    this.modal = { show: true, type: 'box', targetId: box.id, title: '📌 블루차트 메모 편집 (더블클릭)', value: box.text };
                },
                openTableModal(row) {
                    const names = { R1: "R: 상담자-내담자 관계 탐색", R2: "R: 내담자 주변인물 관계 탐색", W: "W: 바람(Want) 탐색", D: "D: 행동/지향(Doing) 탐색", E: "E: 내적 평가(Evaluation)", P: "P: 계획(Plan) 수립" };
                    this.modal = { show: true, type: 'table', targetId: row, title: names[row], value: this.currentCase.table[row] || '' };
                },
                saveModalValue() {
                    if (this.modal.type === 'box') {
                        let b = this.currentCase.boxes.find(x => x.id === this.modal.targetId);
                        if (b) b.text = this.modal.value;
                    } else if (this.modal.type === 'table') {
                        this.currentCase.table[this.modal.targetId] = this.modal.value;
                    }
                    this.modal.show = false;
                },
                deleteBox() {
                    this.currentCase.boxes = this.currentCase.boxes.filter(x => x.id !== this.modal.targetId);
                    this.modal.show = false;
                },
                async saveData() {
                    if(!this.currentCase.client_name.trim()) return alert("사례명을 입력해 주세요.");
                    this.currentCase.updated_at = new Date().toLocaleDateString();
                    
                    // 🔔 저장 시작 시 알림 가동
                    this.triggerStatus('loading', '구글 시트에 저장 중...');
                    
                    let idx = this.caseList.findIndex(c => c.id === this.currentCase.id);
                    if(idx >= 0) this.caseList[idx] = JSON.parse(JSON.stringify(this.currentCase));
                    else this.caseList.push(JSON.parse(JSON.stringify(this.currentCase)));
                    
                    let names = this.caseList.map(c => c.client_name.trim()).filter(n => n !== "");
                    this.uniqueClientNames = [...new Set(names)].sort();
                    
                    if(GAS_WEB_APP_URL.includes("macros")) {
                        try {
                            await fetch(GAS_WEB_APP_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'save', ...this.currentCase })
                            });
                            // 🔔 저장 성공 완료 알림으로 전환 (2.5초 후 자동 소멸)
                            this.triggerStatus('success', '저장 완료!');
                        } catch(e) { 
                            this.triggerStatus('success', '서버 저장 실패 (로컬 임시저장)');
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
