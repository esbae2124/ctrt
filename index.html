<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현실치료 사례개념화 노트</title>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .chart-container { position: relative; width: 100%; max-width: 800px; }
        .text-box {
            position: absolute; background: rgba(255, 255, 255, 0.85);
            border: 1px solid #4b5563; font-size: 9.5pt; resize: both; overflow: auto;
            cursor: move; min-width: 90px; min-height: 45px; z-index: 10;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-6" x-data="app()" x-init="initApp()">

    <div x-show="!isLoggedIn" class="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-xl font-bold mb-4 text-center text-gray-800">현실치료 노트 인증</h2>
            <input type="password" x-model="password" @keyup.enter="login" class="w-full p-2 border rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="비밀번호 입력">
            <button @click="login" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold">로그인</button>
        </div>
    </div>

    <div x-show="isLoggedIn" class="max-w-7xl mx-auto" x-cloak>
        <header class="flex flex-col sm:flex-row justify-between items-center mb-6 pb-4 border-b gap-4">
            <h1 class="text-2xl font-bold text-gray-800">🌿 현실치료 사례개념화 시스템</h1>
            <div class="space-x-2">
                <button @click="toggleList" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700 transition">📋 조회/목록</button>
                <button @click="createNewCase" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">➕ 새 사례 추가</button>
            </div>
        </header>

        <div x-show="showList" class="bg-white p-6 rounded-lg shadow mb-6 overflow-x-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-700">사례 및 상황 목록</h3>
                <button @click="loadDataFromSheets" class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300">🔄 새로고침</button>
            </div>
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-gray-100 text-left text-sm text-gray-600">
                        <th class="p-3 border">사례명 (내담자)</th>
                        <th class="p-3 border">상황명</th>
                        <th class="p-3 border">작성/수정일</th>
                        <th class="p-3 border">관리</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <template x-for="item in caseList" :key="item.id">
                        <tr class="hover:bg-gray-50 cursor-pointer" @click="selectCase(item)">
                            <td class="p-3 border font-semibold text-gray-800" x-text="item.client_name"></td>
                            <td class="p-3 border text-indigo-600 font-medium" x-text="item.situation_name || '기본 상황'"></td>
                            <td class="p-3 border text-gray-500" x-text="item.updated_at"></td>
                            <td class="p-3 border">
                                <button @click.stop="addSituation(item)" class="bg-green-600 text-white text-xs px-2 py-1 rounded hover:bg-green-700">상황 추가</button>
                            </td>
                        </tr>
                    </template>
                    <template x-if="caseList.length === 0">
                        <tr>
                            <td colspan="4" class="p-6 text-center text-gray-400">등록된 사례가 없습니다. 새 사례를 추가해 주세요.</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div x-show="currentCase" class="bg-white p-6 rounded-lg shadow-lg">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 pb-4 border-b">
                <div class="flex flex-wrap items-center gap-3">
                    <input type="text" x-model="currentCase.client_name" class="text-2xl font-bold border-b-2 border-gray-300 focus:border-indigo-500 focus:outline-none pb-1" placeholder="내담자 이름(사례명)">
                    <span class="text-gray-400 text-xl">/</span>
                    <input type="text" x-model="currentCase.situation_name" class="text-lg border-b-2 border-gray-200 focus:border-indigo-400 focus:outline-none pb-1 text-indigo-600" placeholder="상황명 입력 (예: 부부 갈등)">
                </div>
                <button @click="saveData" class="w-full md:w-auto bg-indigo-600 text-white px-6 py-2.5 rounded-lg shadow font-bold hover:bg-indigo-700 transition">
                    💾 저장하기 (Ctrl+Enter)
                </button>
            </div>

            <div class="mb-6 p-4 bg-gray-50 rounded-xl border border-gray-200">
                <h4 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    👤 내담자 기본 프로필 및 임상 정보 (사례 공통)
                </h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">인상착의 및 행동 관찰</label>
                        <textarea x-model="currentCase.client_info.description" class="w-full p-2 border rounded-md text-sm h-24 focus:ring-1 focus:ring-indigo-500 outline-none resize-none" placeholder="예: 30대 중반, 축 처진 어깨, 작은 목소리로 대답함. 눈맞춤을 피함."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">심리검사 결과 요약 (MMPI, TCI, SCT 등)</label>
                        <textarea x-model="currentCase.client_info.test_results" class="w-full p-2 border rounded-md text-sm h-24 focus:ring-1 focus:ring-indigo-500 outline-none resize-none" placeholder="예: MMPI-2 2-7 코드 상승(우울/불안). SCT에서 권위자에 대한 적대감 관찰됨."></textarea>
                    </div>
                </div>
                
                <div class="mt-4">
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-semibold text-gray-500">임상 자료 및 심리검사지 파일 링크 (구글 드라이브 등)</label>
                        <button @click="addFileLink" class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-bold px-2 py-1 rounded border border-indigo-200 transition">
                            ➕ 파일 링크 추가
                        </button>
                    </div>
                    
                    <div class="space-y-2 max-h-40 overflow-y-auto pr-1">
                        <template x-for="(linkItem, index) in currentCase.client_info.file_links" :key="index">
                            <div class="flex gap-2 items-center bg-white p-1.5 rounded-md border shadow-sm">
                                <input type="text" x-model="linkItem.name" class="w-1/4 p-1.5 border rounded text-xs focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="자료 설명 (예: MMPI 결과지)">
                                <input type="text" x-model="linkItem.url" class="flex-1 p-1.5 border rounded text-xs focus:ring-1 focus:ring-indigo-500 outline-none" placeholder="구글 드라이브 링크 붙여넣기">
                                
                                <template x-if="linkItem.url">
                                    <a :href="linkItem.url" target="_blank" class="bg-gray-700 text-white p-1.5 rounded text-xs font-medium hover:bg-gray-800 transition">
                                        🔗 열기
                                    </a>
                                </template>
                                <button @click="removeFileLink(index)" class="bg-red-50 text-red-600 hover:bg-red-100 border border-red-200 p-1.5 rounded text-xs transition">
                                    🗑️ 삭제
                                </button>
                            </div>
                        </template>
                        <template x-if="!currentCase.client_info.file_links || currentCase.client_info.file_links.length === 0">
                            <p class="text-xs text-gray-400 italic text-center py-2 bg-white rounded border border-dashed">등록된 첨부 파일 링크가 없습니다.오른쪽 상단 버튼으로 추가하세요.</p>
                        </template>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-gray-700 flex items-center">📊 블루차트 (Total Behavior)</span>
                        <button @click="addTextBox" class="bg-yellow-500 text-white text-xs px-3 py-1.5 rounded-md shadow hover:bg-yellow-600">+ 텍스트 박스 추가</button>
                    </div>
                    <div class="chart-container border rounded-lg bg-gray-50 p-1 overflow-hidden shadow-inner" id="chartArea">
    
    <img src="https://docs.google.com/uc?export=download&id=1SHB471ly5ECZw8SAU2oFyqfsFfZyZ6r0" alt="Blue Chart" class="w-full opacity-95 select-none">
    
    <template x-for="box in currentCase.boxes" :key="box.id">
                            <div class="text-box rounded shadow-md p-1.5"
                                 :style="`left: ${box.x}px; top: ${box.y}px; width: ${box.w}px; height: ${box.h}px;`"
                                 @mousedown="dragStart($event, box)"
                                 @click="openBoxModal(box)">
                                <div class="w-full h-full overflow-hidden break-all leading-tight text-gray-800" x-html="box.text.replace(/\n/g, '<br>') || '<span class=\'text-gray-400\'>편집...</span>'"></div>
                            </div>
                        </template>
                    </div>
                </div>

                <div>
                    <span class="font-bold text-gray-700 block mb-2">📋 R-R-W-D-E-P 상담 과정 기록</span>
                    <div class="border rounded-lg overflow-hidden shadow-sm bg-white divide-y">
                        <template x-for="row in ['R1', 'R2', 'W', 'D', 'E', 'P']">
                            <div class="flex hover:bg-gray-50 cursor-pointer transition" @click="openTableModal(row)">
                                <div class="w-20 bg-gray-50 font-bold flex flex-col items-center justify-center p-4 border-r text-gray-700">
                                    <span class="text-xl" x-text="row[0]"></span>
                                    <span class="text-xs text-gray-400" x-text="row === 'R1' ? '관계' : row === 'R2' ? '주변' : ''"></span>
                                </div>
                                <div class="flex-1 p-4 text-sm text-gray-600 min-h-[4.5rem] flex items-center whitespace-pre-line leading-relaxed" 
                                     x-text="currentCase.table[row] || '클릭하여 핵심 문장을 기록하세요 (1~2문장 권장).'"></div>
                            </div>
                        </template>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div x-show="modal.show" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" x-cloak>
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-lg mx-4">
            <h3 class="text-lg font-bold mb-3 text-gray-800" x-text="modal.title"></h3>
            <textarea x-model="modal.value" class="w-full h-40 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none mb-4 text-sm leading-relaxed" placeholder="줄바꿈: Enter / 저장: Ctrl+Enter"></textarea>
            <div class="flex justify-between items-center">
                <template x-if="modal.type === 'box'">
                    <button @click="deleteBox" class="bg-red-500 text-white px-3 py-1.5 rounded-md text-sm hover:bg-red-600">메모 삭제</button>
                </template>
                <div class="flex space-x-2 ml-auto">
                    <button @click="modal.show = false" class="bg-gray-300 text-gray-700 px-4 py-1.5 rounded-md text-sm">취소</button>
                    <button @click="saveModalValue" class="bg-indigo-600 text-white px-4 py-1.5 rounded-md text-sm font-bold hover:bg-indigo-700">🚀 적용</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 여기에 구글 웹 앱 새 배포 성공 후 생성된 최종 URL 주소를 붙여넣으세요!
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyFCssMTQ9A0LsTlB--GsCdZdyg_18LGiMrQlGuiW_FfL0fzXFVTfD2479Wzgptu7kO6w/exec"; 

        function app() {
            return {
                isLoggedIn: false, password: '', showList: false,
                caseList: [], currentCase: null,
                modal: { show: false, type: '', targetId: '', title: '', value: '' },
                
                initApp() {
                    window.addEventListener('keydown', (e) => {
                        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                            if(this.modal.show) { this.saveModalValue(); }
                            else if(this.currentCase) { this.saveData(); }
                        }
                    });
                },
                login() {
                    if(this.password === "1234") { 
                        this.isLoggedIn = true;
                        this.loadDataFromSheets();
                    } else { alert("비밀번호가 올바르지 않습니다."); }
                },
                toggleList() {
                    this.showList = !this.showList;
                    if(this.showList) this.loadDataFromSheets();
                },
                async loadDataFromSheets() {
                    if(!GAS_WEB_APP_URL.includes("macros")) return;
                    try {
                        let response = await fetch(GAS_WEB_APP_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'fetch' })
                        });
                        let data = await response.json();
                        // 로드한 각 사례의 하위 호환성 보장 처리
                        this.caseList = data.map(item => {
                            if (!item.client_info) {
                                item.client_info = { description: '', test_results: '', file_links: [] };
                            } else if (typeof item.client_info.file_url !== 'undefined' && !item.client_info.file_links) {
                                // 기존의 단일 링크(file_url) 정보가 시트에 있었다면 리스트 형태로 자동 변환해 줌
                                item.client_info.file_links = item.client_info.file_url ? [{ name: '기본 파일', url: item.client_info.file_url }] : [];
                                delete item.client_info.file_url;
                            }
                            if(!item.client_info.file_links) item.client_info.file_links = [];
                            return item;
                        });
                    } catch (e) { console.error("데이터 로드 실패:", e); }
                },
                createNewCase() {
                    this.currentCase = {
                        id: Date.now(), client_name: '', situation_name: '',
                        created_at: new Date().toLocaleDateString(), updated_at: new Date().toLocaleDateString(),
                        table: { R1:'', R2:'', W:'', D:'', E:'', P:'' }, boxes: [],
                        client_info: { description: '', test_results: '', file_links: [] }
                    };
                    this.showList = false;
                },
                addSituation(parentCase) {
                    this.currentCase = {
                        id: Date.now(),
                        client_name: parentCase.client_name,
                        situation_name: '',
                        created_at: new Date().toLocaleDateString(),
                        updated_at: new Date().toLocaleDateString(),
                        table: { R1:'', R2:'', W:'', D:'', E:'', P:'' }, boxes: [],
                        client_info: JSON.parse(JSON.stringify(parentCase.client_info))
                    };
                    this.showList = false;
                },
                selectCase(item) {
                    this.currentCase = JSON.parse(JSON.stringify(item));
                    this.showList = false;
                },
                addFileLink() {
                    if(!this.currentCase.client_info.file_links) {
                        this.currentCase.client_info.file_links = [];
                    }
                    this.currentCase.client_info.file_links.push({ name: '', url: '' });
                },
                removeFileLink(index) {
                    this.currentCase.client_info.file_links.splice(index, 1);
                },
                addTextBox() {
                    if(!this.currentCase) return;
                    this.currentCase.boxes.push({ id: Date.now(), text: '새 메모', x: 40, y: 60, w: 120, h: 50 });
                },
                dragStart(e, box) {
                    let container = document.getElementById('chartArea').getBoundingClientRect();
                    let moveHandler = (moveEvent) => {
                        box.x = Math.max(0, Math.min(moveEvent.clientX - container.left - (box.w / 2), container.width - box.w));
                        box.y = Math.max(0, Math.min(moveEvent.clientY - container.top - (box.h / 2), container.height - box.h));
                    };
                    let upHandler = () => {
                        window.removeEventListener('mousemove', moveHandler);
                        window.removeEventListener('mouseup', upHandler);
                    };
                    window.addEventListener('mousemove', moveHandler);
                    window.addEventListener('mouseup', upHandler);
                },
                openBoxModal(box) {
                    this.modal = { show: true, type: 'box', targetId: box.id, title: '📌 블루차트 메모 편집', value: box.text };
                },
                openTableModal(row) {
                    const names = { R1: "R: 상담자-내담자 관계 탐색", R2: "R: 내담자 주변인물 관계 탐색", W: "W: 바람(Want) 탐색", D: "D: 행동/지향(Doing) 탐색", E: "E: 내적 평가(Evaluation)", P: "P: 계획(Plan) 수립" };
                    this.modal = { show: true, type: 'table', targetId: row, title: names[row], value: this.currentCase.table[row] || '' };
                },
                saveModalValue() {
                    if (this.modal.type === 'box') {
                        let b = this.currentCase.boxes.find(x => x.id === this.modal.targetId);
                        if (b) b.text = this.modal.value;
                    } else if (this.modal.type === 'table') {
                        this.currentCase.table[this.modal.targetId] = this.modal.value;
                    }
                    this.modal.show = false;
                },
                deleteBox() {
                    this.currentCase.boxes = this.currentCase.boxes.filter(x => x.id !== this.modal.targetId);
                    this.modal.show = false;
                },
                async saveData() {
                    if(!this.currentCase.client_name.trim()) return alert("사례명을 입력해 주세요.");
                    this.currentCase.updated_at = new Date().toLocaleDateString();
                    
                    let idx = this.caseList.findIndex(c => c.id === this.currentCase.id);
                    if(idx >= 0) this.caseList[idx] = JSON.parse(JSON.stringify(this.currentCase));
                    else this.caseList.push(JSON.parse(JSON.stringify(this.currentCase)));
                    
                    if(GAS_WEB_APP_URL.includes("macros")) {
                        try {
                            await fetch(GAS_WEB_APP_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'save', ...this.currentCase })
                            });
                            alert("구글 시트에 성공적으로 동기화되었습니다!");
                        } catch(e) { alert("서버 저장 실패 (로컬 임시저장됨)"); }
                    } else {
                        alert("가상 저장 완료 (GAS URL 연동 시 서버에 보존됩니다)");
                    }
                }
            }
        }
    </script>
</body>
</html>
